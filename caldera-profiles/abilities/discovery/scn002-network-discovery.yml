---
- id: scn002-a2-network-discovery
  name: "SCN-002 | Network Configuration Discovery"
  description: |
    Enumerates network interfaces, IP addresses, active connections, routing
    table, and DNS configuration. Attacker uses this to map the internal network,
    identify reachable hosts, and plan lateral movement paths.
    All native Windows commands. Maps to T1016.
  tactic: discovery
  technique:
    attack_id: T1016
    name: "System Network Configuration Discovery"
  platforms:
    windows:
      psh:
        command: |
          Write-Output "=== NETWORK DISCOVERY (T1016) ===";
          Write-Output "[*] IP Configuration:";
          Get-NetIPAddress | Where-Object { $_.AddressFamily -eq "IPv4" } |
            Select-Object InterfaceAlias, IPAddress, PrefixLength |
            Format-Table -AutoSize | Out-String;
          Write-Output "[*] Active Connections (ESTABLISHED):";
          netstat -ano | Select-String "ESTABLISHED" | Out-String;
          Write-Output "[*] Routing Table:";
          Get-NetRoute | Where-Object { $_.RouteMetric -lt 256 } |
            Select-Object DestinationPrefix, NextHop, InterfaceAlias |
            Format-Table -AutoSize | Out-String;
          Write-Output "[*] DNS Servers:";
          Get-DnsClientServerAddress | Where-Object { $_.ServerAddresses } |
            Select-Object InterfaceAlias, ServerAddresses |
            Format-Table -AutoSize | Out-String;
          Write-Output "=== END NETWORK DISCOVERY ==="
        cleanup: ""
