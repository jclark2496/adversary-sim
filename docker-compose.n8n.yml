# =============================================================================
# Adversary Sim — n8n Stack (Standalone Mode Only)
# =============================================================================
# This file is ONLY used when LabOps is NOT installed.
# When LabOps is running, adversary-sim imports its workflows into LabOps' n8n.
#
# Usage (handled automatically by Makefile):
#   docker compose -f docker-compose.yml -f docker-compose.n8n.yml up -d
# =============================================================================

volumes:
  n8n-data:

services:

  n8n:
    image: n8nio/n8n:latest
    container_name: advsim-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5679}:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_SECURE_COOKIE=false
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?Set N8N_PASSWORD in .env}
      - GENERIC_TIMEZONE=${TIMEZONE:-America/Chicago}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - AI_PROVIDER=${AI_PROVIDER:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-}
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path,child_process,https,http
      - GUAC_ADMIN_USER=${GUAC_ADMIN_USER:-guacadmin}
      - GUAC_ADMIN_PASSWORD=${GUAC_ADMIN_PASSWORD:-guacadmin}
      - VICTIM_USER=${VICTIM_USER:-demo}
      - VICTIM_PASSWORD=${VICTIM_PASSWORD:-}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
      - ./nginx/html:/data/scenarios
      - ./:/data/repo
    networks:
      - advsim-net

networks:
  advsim-net:
