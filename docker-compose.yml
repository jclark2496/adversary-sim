# =============================================================================
# Adversary Sim — Sophos Adversary Simulation Platform
# Core Services (always started)
# =============================================================================
# Usage:
#   Standalone:  docker compose -f docker-compose.yml -f docker-compose.guacamole.yml up -d
#   With LabOps: docker compose up -d
#
# The Makefile handles this automatically — just run: make install
# =============================================================================

# Network is set by docker-compose.override.yml (generated by make install)
# - Standalone: creates advsim-net
# - With LabOps: uses labops-net (external)

volumes:
  caldera-data:
  n8n-data:

services:

  # ---------------------------------------------------------------------------
  # MITRE CALDERA — Adversary Emulation Server
  # Built from source: caldera:local (v5.1.0, native ARM64)
  # UI: http://localhost:8888   red: red/admin   blue: blue/admin
  # ---------------------------------------------------------------------------
  caldera:
    image: caldera:local
    pull_policy: never
    container_name: advsim-caldera
    restart: unless-stopped
    ports:
      - "${CALDERA_PORT:-8888}:8888"
      - "8443:8443"
      - "7010:7010"
      - "7011:7011"
      - "7012:7012"
    volumes:
      - caldera-data:/usr/src/app/data
      - ./caldera/conf/local.yml:/usr/src/app/conf/local.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ---------------------------------------------------------------------------
  # Atomic Red Team Runner
  # ARM64 Ubuntu container with ART test definitions
  # ---------------------------------------------------------------------------
  atomic-runner:
    build:
      context: ./atomic-runner
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: advsim-atomic
    restart: unless-stopped
    volumes:
      - ./atomic-runner/tests:/opt/art/tests
      - ./atomic-runner/results:/opt/art/results
    command: tail -f /dev/null

  # ---------------------------------------------------------------------------
  # n8n — Workflow Automation
  # Scenario enrichment via Ollama + config API for dashboard
  # UI: http://localhost:5679
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    platform: linux/arm64
    container_name: advsim-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5679}:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_SECURE_COOKIE=false
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?Set N8N_PASSWORD in .env}
      - GENERIC_TIMEZONE=${TIMEZONE:-America/Chicago}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path,child_process
      - GUAC_ADMIN_USER=${GUAC_ADMIN_USER:-guacadmin}
      - GUAC_ADMIN_PASSWORD=${GUAC_ADMIN_PASSWORD:-guacadmin}
      - VICTIM_USER=${VICTIM_USER:-demo}
      - VICTIM_PASSWORD=${VICTIM_PASSWORD:-}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
      - ./nginx/html:/data/scenarios

  # ---------------------------------------------------------------------------
  # Nginx — SE Console + Reverse Proxy
  # Serves index.html, console.html, admin.html
  # Proxies /caldera/, /guacamole/, /api/
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    platform: linux/arm64
    container_name: advsim-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8081}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro

  # ---------------------------------------------------------------------------
  # Kali Linux — Attacker Node
  # SSH: ssh root@localhost -p 2222 (password: kali)
  # ---------------------------------------------------------------------------
  kali:
    image: kalilinux/kali-rolling:latest
    platform: linux/arm64
    container_name: advsim-kali
    restart: unless-stopped
    ports:
      - "${KALI_PORT:-2222}:22"
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq openssh-server nmap curl wget python3 python3-impacket crackmapexec &&
        mkdir -p /run/sshd &&
        echo 'root:kali' | chpasswd &&
        sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config &&
        sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        /usr/sbin/sshd -D
      "
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
