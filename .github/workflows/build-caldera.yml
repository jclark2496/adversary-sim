name: Build Multi-Arch CALDERA

on:
  workflow_dispatch:
    inputs:
      caldera_tag:
        description: 'MITRE CALDERA git tag to build (e.g. 5.1.0)'
        required: true
        default: '5.1.0'
      image_tag:
        description: 'GHCR image tag to push (e.g. 5.1.0)'
        required: true
        default: '5.1.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch CALDERA
        uses: docker/build-push-action@v6
        with:
          context: "https://github.com/mitre/caldera.git#${{ github.event.inputs.caldera_tag }}"
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/jclark2496/caldera:${{ github.event.inputs.image_tag }}
