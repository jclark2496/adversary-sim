<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stage Dive — Sophos</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #06080f;
      color: #fff;
      font-family: 'Courier New', monospace;
    }

    /* ── Slide system ── */
    #slides-track {
      display: flex;
      width: 300vw;
      height: 100vh;
      transition: transform 400ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .slide {
      width: 100vw;
      height: 100vh;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    /* ── Navigation arrows ── */
    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.35);
      font-size: 36px;
      width: 56px;
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s, opacity 0.3s;
      opacity: 0;
      line-height: 1;
    }
    body:hover .nav-arrow:not(.disabled) { opacity: 1; }
    .nav-arrow:not(.disabled):hover { background: rgba(0,168,224,0.14); color: #00A8E0; border-color: rgba(0,168,224,0.35); }
    .nav-arrow.disabled { opacity: 0 !important; pointer-events: none; }
    #nav-prev { left: 10px; }
    #nav-next { right: 10px; }

    /* ── Dot indicators ── */
    #dot-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 200;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }
    .dot.active { background: #00A8E0; transform: scale(1.3); }

    /* ── ESC hint ── */
    #esc-hint {
      position: fixed;
      bottom: 18px;
      right: 18px;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      z-index: 200;
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    /* ── Common top bar ── */
    .slide-topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(6,8,15,0.85);
      border-bottom: 1px solid rgba(0,168,224,0.18);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    .topbar-logo {
      font-family: var(--ft, 'Orbitron', sans-serif);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: #00A8E0;
    }
    .topbar-sep {
      width: 1px; height: 18px;
      background: rgba(0,168,224,0.2);
      flex-shrink: 0;
    }
    .topbar-scenario {
      font-family: var(--ft, 'Orbitron', sans-serif);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #fff;
    }
    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 10px;
      border: 1px solid rgba(255,60,60,0.4);
      border-radius: 3px;
      background: rgba(255,60,60,0.07);
    }
    .live-badge.done { border-color: rgba(0,200,100,0.4); background: rgba(0,200,100,0.07); }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ff4444;
      animation: pulse-red 1.3s ease-in-out infinite;
    }
    .live-badge.done .live-dot { background: #00c864; animation: none; }
    @keyframes pulse-red {
      0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(255,68,68,.5); }
      50%      { opacity:.5; box-shadow:0 0 0 4px rgba(255,68,68,0); }
    }
    .live-text {
      font-family: var(--ft, 'Orbitron', sans-serif);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: #ff4444;
    }
    .live-badge.done .live-text { color: #00c864; }
    #op-timer {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.06em;
      min-width: 70px;
    }

    /* ─────────────────────────────────────────────
       SLIDE 1 — Attacker Feed
    ───────────────────────────────────────────── */
    #feed-full {
      position: absolute;
      top: 52px; bottom: 0; left: 0; right: 0;
      overflow-y: auto;
      padding: 24px 36px 60px;
    }
    #feed-empty {
      position: absolute;
      top: 52px; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }
    .feed-spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(0,168,224,0.15);
      border-top-color: #00A8E0;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .feed-waiting-text {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }
    .feed-item {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 18px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      animation: fadeUp 0.35s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .feed-chip {
      flex-shrink: 0;
      width: 108px;
      text-align: center;
      padding: 5px 8px;
      border-radius: 4px;
      font-family: var(--ft, 'Orbitron', sans-serif);
      font-size: 8px;
      letter-spacing: 0.14em;
      font-weight: 700;
      margin-top: 6px;
    }
    .chip-running  { background: rgba(0,168,224,0.12); border: 1px solid rgba(0,168,224,0.38); color: #00A8E0; animation: blink 1.4s ease-in-out infinite; }
    .chip-complete { background: rgba(0,200,100,0.08); border: 1px solid rgba(0,200,100,0.32); color: #00c864; }
    .chip-blocked  { background: rgba(255,60,60,0.08); border: 1px solid rgba(255,60,60,0.32); color: #ff4444; }
    .chip-queued   { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.45; } }

    .feed-info { flex: 1; min-width: 0; }
    .feed-tactic {
      font-size: 11px;
      color: #FF6900;
      letter-spacing: 0.1em;
      margin-bottom: 5px;
      text-transform: uppercase;
    }
    .feed-name {
      font-family: var(--ft, 'Orbitron', sans-serif);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 7px;
    }
    .feed-tech {
      font-size: 13px;
      color: rgba(0,168,224,0.65);
      letter-spacing: 0.04em;
    }

    /* ─────────────────────────────────────────────
       SLIDE 2 — Unmanaged Victim
    ───────────────────────────────────────────── */
    #unmanaged-banner {
      position: absolute;
      top: 52px; left: 0; right: 0;
      height: 34px;
      background: rgba(255,80,0,0.12);
      border-bottom: 1px solid rgba(255,105,0,0.4);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ft, 'Orbitron', sans-serif);
      font-size: 10px;
      letter-spacing: 0.2em;
      font-weight: 700;
      color: #FF6900;
      z-index: 5;
    }
    #guac-frame-2 {
      position: absolute;
      top: 86px; bottom: 0; left: 0; right: 0;
      border: none;
      background: #000;
    }
    #rdp-loading-2 {
      position: absolute;
      top: 86px; bottom: 0; left: 0; right: 0;
      background: #06080f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
    }

    /* ─────────────────────────────────────────────
       SLIDE 3 — Split View
    ───────────────────────────────────────────── */
    #split-left {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 50%;
      background: #06080f;
      border-right: 1px solid rgba(0,168,224,0.15);
    }
    #split-right {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 50%;
      background: #000;
    }
    .split-topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 48px;
      display: flex; align-items: center;
      padding: 0 20px;
      backdrop-filter: blur(8px);
      z-index: 5;
    }
    #split-left .split-topbar {
      background: rgba(6,8,15,0.85);
      border-bottom: 1px solid rgba(0,168,224,0.12);
    }
    #split-right .split-topbar {
      background: rgba(0,20,10,0.85);
      border-bottom: 1px solid rgba(0,200,100,0.25);
    }
    .split-label {
      font-family: var(--ft, 'Orbitron', sans-serif);
      font-size: 10px;
      letter-spacing: 0.2em;
      font-weight: 700;
    }
    .split-label.attacker { color: #FF6900; }
    .split-label.managed  { color: #00c864; }

    #feed-compact {
      position: absolute;
      top: 48px; bottom: 0; left: 0; right: 0;
      overflow-y: auto;
      padding: 12px 16px 52px;
    }
    .feed-item-sm {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .chip-sm {
      flex-shrink: 0;
      width: 72px;
      text-align: center;
      padding: 3px 5px;
      border-radius: 3px;
      font-family: var(--ft, 'Orbitron', sans-serif);
      font-size: 7px;
      letter-spacing: 0.1em;
      font-weight: 700;
      margin-top: 3px;
    }
    .feed-name-sm {
      font-family: var(--ft, 'Orbitron', sans-serif);
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
    }
    .feed-tactic-sm {
      font-size: 10px;
      color: rgba(255,105,0,0.65);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #guac-frame-3 {
      position: absolute;
      top: 48px; bottom: 0; left: 0; right: 0;
      border: none;
      background: #000;
    }
    #rdp-loading-3 {
      position: absolute;
      top: 48px; bottom: 0; left: 0; right: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }

    /* ── Shared loading elements ── */
    .rdp-spinner {
      width: 38px; height: 38px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: #00A8E0;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .rdp-loading-text {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div id="slides-track">

  <!-- ════════════ SLIDE 1 — ATTACKER VIEW ════════════ -->
  <div class="slide" id="slide-0">
    <div class="slide-topbar">
      <div class="topbar-logo">SOPHOS&nbsp;//&nbsp;STAGE&nbsp;DIVE</div>
      <div class="topbar-sep"></div>
      <div class="topbar-scenario" id="scenario-name"></div>
      <div class="topbar-right">
        <div class="live-badge" id="live-badge">
          <div class="live-dot"></div>
          <div class="live-text">LIVE</div>
        </div>
        <div id="op-timer">00:00:00</div>
      </div>
    </div>
    <div id="feed-full"></div>
    <div id="feed-empty">
      <div class="feed-spinner"></div>
      <div class="feed-waiting-text">Waiting for operation to start...</div>
    </div>
  </div>

  <!-- ════════════ SLIDE 2 — UNMANAGED VICTIM ════════════ -->
  <div class="slide" id="slide-1">
    <div class="slide-topbar">
      <div class="topbar-logo">SOPHOS&nbsp;//&nbsp;STAGE&nbsp;DIVE</div>
      <div class="topbar-sep"></div>
      <div class="topbar-scenario" id="scenario-name-2"></div>
      <div class="topbar-right">
        <div class="live-badge" id="live-badge-2">
          <div class="live-dot"></div>
          <div class="live-text">LIVE</div>
        </div>
      </div>
    </div>
    <div id="unmanaged-banner">UNMANAGED VICTIM &nbsp;·&nbsp; NO SOPHOS PROTECTION</div>
    <div id="rdp-loading-2">
      <div class="rdp-spinner"></div>
      <div class="rdp-loading-text">Connecting to victim...</div>
    </div>
    <iframe id="guac-frame-2" style="display:none"></iframe>
  </div>

  <!-- ════════════ SLIDE 3 — SPLIT VIEW ════════════ -->
  <div class="slide" id="slide-2">
    <div id="split-left">
      <div class="split-topbar">
        <span class="split-label attacker">ATTACKER VIEW</span>
      </div>
      <div id="feed-compact"></div>
    </div>
    <div id="split-right">
      <div class="split-topbar">
        <span class="split-label managed">SOPHOS PROTECTED</span>
      </div>
      <div id="rdp-loading-3">
        <div class="rdp-spinner"></div>
        <div class="rdp-loading-text">Connecting to managed VM...</div>
      </div>
      <iframe id="guac-frame-3" style="display:none"></iframe>
    </div>
  </div>

</div>

<!-- ── Nav controls ── -->
<button class="nav-arrow disabled" id="nav-prev" onclick="navigate(-1)">&#8249;</button>
<button class="nav-arrow" id="nav-next" onclick="navigate(1)">&#8250;</button>

<div id="dot-nav">
  <div class="dot active" onclick="goToSlide(0)"></div>
  <div class="dot" onclick="goToSlide(1)"></div>
  <div class="dot" onclick="goToSlide(2)"></div>
</div>

<div id="esc-hint">ESC — exit</div>

<script>
// ── URL params ────────────────────────────────────────────────
const p          = new URLSearchParams(window.location.search);
const OP_ID      = p.get('operation_id');
const MANAGED_IP = p.get('managed_ip')   || '';
const UNMANAGED_IP = p.get('unmanaged_ip') || '';
const SCENARIO   = p.get('scenario_name') || 'Stage Dive';

// Guard: must have operation_id
if (!OP_ID) { window.location.href = '/'; }

// ── Constants ─────────────────────────────────────────────────
const CALDERA_BASE = '/caldera';
const CALDERA_KEY  = 'MDRLABRED';
const GUAC_PROXY   = '/guacamole';
const GUAC_DS      = 'postgresql';
let   GUAC_ADMIN    = 'guacadmin';
let   GUAC_ADMIN_PW = 'guacadmin';

// ── State ─────────────────────────────────────────────────────
let currentSlide = 0;
let opLinks      = [];
let opDone       = false;
let pollTick     = null;
let timerTick    = null;
let opStart      = Date.now();
const rdpConnected = {};  // slideIndex -> true/false

// ── Init page ─────────────────────────────────────────────────
document.getElementById('scenario-name').textContent   = SCENARIO;
document.getElementById('scenario-name-2').textContent = SCENARIO;

// Fetch Guacamole credentials from config API
fetch('/api/config')
  .then(r => r.ok ? r.json() : {})
  .then(cfg => {
    if (cfg.guacAdmin)   GUAC_ADMIN    = cfg.guacAdmin;
    if (cfg.guacAdminPw) GUAC_ADMIN_PW = cfg.guacAdminPw;
  })
  .catch(() => {});

// Start polling + timer
startTimer();
poll();
pollTick = setInterval(poll, 3000);

// ── Timer ─────────────────────────────────────────────────────
function startTimer() {
  timerTick = setInterval(() => {
    const s  = Math.floor((Date.now() - opStart) / 1000);
    const hh = String(Math.floor(s / 3600)).padStart(2, '0');
    const mm = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    const el = document.getElementById('op-timer');
    if (el) el.textContent = `${hh}:${mm}:${ss}`;
  }, 1000);
}

// ── Poll CALDERA ──────────────────────────────────────────────
async function poll() {
  try {
    const r = await fetch(`${CALDERA_BASE}/api/v2/operations/${OP_ID}`, {
      headers: { KEY: CALDERA_KEY }
    });
    if (!r.ok) return;
    const op = await r.json();
    opLinks = op.chain || [];

    const finished = op.state === 'finished' || (op.finish && op.finish.length > 0);
    if (finished && !opDone) {
      opDone = true;
      clearInterval(pollTick);
      clearInterval(timerTick);
      document.querySelectorAll('.live-badge').forEach(b => b.classList.add('done'));
      document.querySelectorAll('.live-text').forEach(t => { t.textContent = 'COMPLETE'; });
    }

    renderFeed();
    renderCompact();

    // Hide waiting spinner once links appear
    const empty = document.getElementById('feed-empty');
    if (empty) empty.style.display = opLinks.length ? 'none' : '';
  } catch (e) { /* silently ignore poll errors */ }
}

// ── Link status helpers ───────────────────────────────────────
function linkRan(lk)     { const s = lk.status; return s === 2 || s === -1 || (s === 0 && lk.finish); }
function linkBlocked(lk) { return lk.status === -1; }
function linkRunning(lk) { return lk.status === 0 && !lk.finish; }

function chipMeta(lk) {
  if (linkBlocked(lk)) return { cls: 'chip-blocked', txt: 'BLOCKED' };
  if (linkRan(lk))     return { cls: 'chip-complete', txt: 'COMPLETE' };
  if (linkRunning(lk)) return { cls: 'chip-running',  txt: 'RUNNING' };
  return                       { cls: 'chip-queued',   txt: 'QUEUED' };
}

// ── Render full attacker feed (Slide 1) ───────────────────────
function renderFeed() {
  const c = document.getElementById('feed-full');
  if (!c) return;
  const atBottom = c.scrollHeight - c.scrollTop - c.clientHeight < 60;

  c.innerHTML = opLinks.map(lk => {
    const ab = lk.ability || {};
    const { cls, txt } = chipMeta(lk);
    return `<div class="feed-item">
      <div class="feed-chip ${cls}">${txt}</div>
      <div class="feed-info">
        <div class="feed-tactic">${esc(ab.tactic || '')}</div>
        <div class="feed-name">${esc(ab.name || 'Unknown Ability')}</div>
        <div class="feed-tech">${ab.technique_id ? esc(ab.technique_id) + ' &nbsp;·&nbsp; ' + esc(ab.technique_name || '') : ''}</div>
      </div>
    </div>`;
  }).join('');

  if (atBottom) c.scrollTop = c.scrollHeight;
}

// ── Render compact feed (Slide 3 left panel) ─────────────────
function renderCompact() {
  const c = document.getElementById('feed-compact');
  if (!c) return;
  c.innerHTML = opLinks.map(lk => {
    const ab = lk.ability || {};
    const { cls, txt } = chipMeta(lk);
    return `<div class="feed-item-sm">
      <div class="chip-sm ${cls}">${txt}</div>
      <div>
        <div class="feed-name-sm">${esc(ab.name || 'Unknown')}</div>
        <div class="feed-tactic-sm">${esc(ab.tactic || '')}</div>
      </div>
    </div>`;
  }).join('');
}

// ── HTML escape ───────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c])
  );
}

// ── Slide navigation ──────────────────────────────────────────
function goToSlide(n) {
  if (n < 0 || n > 2) return;
  currentSlide = n;
  document.getElementById('slides-track').style.transform = `translateX(-${n * 100}vw)`;

  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === n));
  document.getElementById('nav-prev').classList.toggle('disabled', n === 0);
  document.getElementById('nav-next').classList.toggle('disabled', n === 2);

  // Connect RDP on first visit
  if (n === 1 && !rdpConnected[1]) {
    rdpConnected[1] = true;
    connectRDP(UNMANAGED_IP, 'guac-frame-2', 'rdp-loading-2');
  }
  if (n === 2 && !rdpConnected[2]) {
    rdpConnected[2] = true;
    connectRDP(MANAGED_IP, 'guac-frame-3', 'rdp-loading-3');
  }
}

function navigate(dir) { goToSlide(currentSlide + dir); }

// ── Keyboard navigation ───────────────────────────────────────
document.addEventListener('keydown', e => {
  if      (e.key === 'ArrowRight') navigate(1);
  else if (e.key === 'ArrowLeft')  navigate(-1);
  else if (e.key === 'Escape')     window.location.href = '/';
});

// ── Guacamole RDP ─────────────────────────────────────────────
async function connectRDP(ip, frameId, loadingId) {
  const loading = document.getElementById(loadingId);
  const frame   = document.getElementById(frameId);

  if (!ip) {
    if (loading) loading.querySelector('.rdp-loading-text').textContent =
      'No IP configured — set in Stage Dive ⚙ Setup';
    return;
  }

  try {
    // 1. Authenticate with Guacamole
    const fd = new URLSearchParams({ username: GUAC_ADMIN, password: GUAC_ADMIN_PW });
    const authR = await fetch(`${GUAC_PROXY}/api/tokens`, { method: 'POST', body: fd });
    if (!authR.ok) throw new Error(`Guacamole auth failed (${authR.status})`);
    const auth  = await authR.json();
    const token = auth.authToken;

    // 2. Create RDP connection
    const connR = await fetch(
      `${GUAC_PROXY}/api/session/data/${GUAC_DS}/connections?token=${token}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:       `stagedive-${frameId}-${Date.now()}`,
          protocol:   'rdp',
          parameters: {
            hostname:           ip,
            port:               '3389',
            'ignore-cert':      'true',
            'enable-wallpaper': 'true',
            'enable-theming':   'true',
          },
          attributes: {
            'max-connections':          '2',
            'max-connections-per-user': '2',
          }
        })
      }
    );
    if (!connR.ok) throw new Error(`Connection creation failed (${connR.status})`);
    const conn   = await connR.json();
    const connId = conn.identifier;

    // 3. Build client URL and load iframe
    const clientId = btoa(`${connId}\0c\0${GUAC_DS}`);
    const rdpURL   = `${GUAC_PROXY}/?token=${token}#/client/${encodeURIComponent(clientId)}`;

    frame.src = rdpURL;
    frame.style.display = '';
    frame.onload = () => { setTimeout(() => { if (loading) loading.style.display = 'none'; }, 700); };

  } catch (err) {
    if (loading) {
      const txt = loading.querySelector('.rdp-loading-text');
      if (txt) txt.textContent = 'Connection failed: ' + err.message;
    }
  }
}
</script>
</body>
</html>
