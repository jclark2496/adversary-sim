server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SE Console front-end
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Proxy to CALDERA (avoids browser CORS restrictions)
    location /caldera/ {
        proxy_pass http://advsim-caldera:8888/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy to n8n webhook endpoints (always advsim-n8n in both modes)
    location /api/ {
        proxy_pass http://advsim-n8n:5678/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy to Apache Guacamole (RDP-in-browser)
    # labops-guacamole is replaced at install time:
    #   standalone: advsim-guacamole
    #   labops:     labops-guacamole
    location /guacamole/ {
        proxy_pass http://labops-guacamole:8080/guacamole/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Serve scenarios.json directly
    location /scenarios.json {
        add_header Access-Control-Allow-Origin *;
        try_files /scenarios.json =404;
    }

    # Block direct access to sensitive config files
    location = /ai-config.json { deny all; }

    # Health check
    location /health {
        return 200 'Adversary Sim OK';
        add_header Content-Type text/plain;
    }
}
